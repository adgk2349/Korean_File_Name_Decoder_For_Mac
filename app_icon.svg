<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle geometric accent - top right corner glow -->
  <circle cx="820" cy="204" r="280" fill="url(#accent)" opacity="0.06"/>

  <!-- Bottom left subtle glow -->
  <circle cx="204" cy="820" r="240" fill="url(#accent)" opacity="0.04"/>

  <!-- Accent bar - left side -->
  <rect x="200" y="320" width="6" height="384" rx="3" fill="url(#accent)" opacity="0.7"/>

  <!-- Letter K -->
  <!-- Vertical stroke -->
  <rect x="260" y="300" width="72" height="424" rx="8" fill="#ffffff"/>

  <!-- Upper diagonal -->
  <polygon points="332,512 332,460 620,300 670,300 670,352" fill="#ffffff"/>

  <!-- Lower diagonal -->
  <polygon points="332,512 332,564 620,724 670,724 670,672" fill="#ffffff"/>

  <!-- Accent dot -->
  <circle cx="700" cy="310" r="28" fill="url(#accent)"/>

  <!-- Subtle bottom accent line -->
  <rect x="260" y="760" width="200" height="4" rx="2" fill="url(#accent)" opacity="0.5"/>
</svg>